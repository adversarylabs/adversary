name: adversarylabs/dockerfile
version: 0.1.0
description: Finds suspicious Dockerfile ENV and ARG names that may expose secrets.

run_when:
  files_changed:
    - "Dockerfile"
    - "**/Dockerfile"
    - "*.Dockerfile"
    - "**/*.Dockerfile"

runtime:
  image: adversarylabs/dockerfile-adversary:0.1.0
  command:
    - /adversary/run

permissions:
  filesystem:
    read:
      - "."
    write:
      - ".adversary/results"
  network: false
  env: []

findings:
  format: adversary.findings.v1
