name: local/{{name}}
version: {{version}}
description: {{description}}

triggers:
  manual: true

runtime:
  image: {{image}}
  command:
    - node
    - dist/index.js

permissions:
  filesystem:
    read:
      - .
    write:
      - .adversary/results
  network: false
  env: []

findings:
  format: adversary.findings.v1
