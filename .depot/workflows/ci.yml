name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  native-test:
    name: native (${{ matrix.os }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/typescript/package-lock.json
      - name: Run native contract tests
        shell: bash
        run: scripts/ci-verify.sh native

  quality:
    name: formatting, modules, and vet
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run quality contract
        run: scripts/ci-verify.sh quality

  race:
    name: race detector
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/typescript/package-lock.json
      - name: Run race suite
        run: scripts/ci-verify.sh race

  coverage:
    name: coverage floor
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/typescript/package-lock.json
      - name: Enforce coverage floor
        run: scripts/ci-verify.sh coverage

  cross-build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64]
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Cross-build
        env:
          TARGET: ${{ matrix.target }}
        run: scripts/ci-verify.sh cross

  template:
    name: generated TypeScript template
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/typescript/package-lock.json
      - name: Test a freshly generated project
        run: scripts/ci-verify.sh template

  smoke:
    name: actual CLI smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Exercise version, init, and non-mutating pack
        run: scripts/ci-verify.sh smoke

  tooling:
    name: workflow, shell, and vulnerability analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run checksum-pinned actionlint, ShellCheck, and govulncheck
        run: scripts/ci-verify.sh tooling

  release-contract:
    name: deterministic release contract
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify deterministic release and publication isolation
        run: scripts/ci-verify.sh release

  # Keep the repository's required "ci / test" check stable while making it
  # authoritative for every platform, contract, build, and security gate.
  test:
    name: test
    if: ${{ always() }}
    needs:
      - native-test
      - quality
      - race
      - coverage
      - cross-build
      - template
      - smoke
      - tooling
      - release-contract
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Require every CI boundary
        env:
          NATIVE_RESULT: ${{ needs.native-test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RACE_RESULT: ${{ needs.race.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CROSS_BUILD_RESULT: ${{ needs.cross-build.result }}
          TEMPLATE_RESULT: ${{ needs.template.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          TOOLING_RESULT: ${{ needs.tooling.result }}
          RELEASE_CONTRACT_RESULT: ${{ needs.release-contract.result }}
        run: |
          test "$NATIVE_RESULT" = success
          test "$QUALITY_RESULT" = success
          test "$RACE_RESULT" = success
          test "$COVERAGE_RESULT" = success
          test "$CROSS_BUILD_RESULT" = success
          test "$TEMPLATE_RESULT" = success
          test "$SMOKE_RESULT" = success
          test "$TOOLING_RESULT" = success
          test "$RELEASE_CONTRACT_RESULT" = success
