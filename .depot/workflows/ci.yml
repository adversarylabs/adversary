name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  native-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Test vendored TypeScript SDK protocol
        run: node --test templates/typescript/vendor/adversary-sdk/test/protocol.test.js

      - name: Test
        run: go test ./...

  # Preserve the existing required "test" check while making it dependent on
  # every native platform result.
  test:
    name: test
    if: ${{ always() }}
    needs: native-test
    runs-on: ubuntu-24.04
    steps:
      - name: Require native platform tests
        env:
          NATIVE_TEST_RESULT: ${{ needs.native-test.result }}
        run: test "$NATIVE_TEST_RESULT" = success
