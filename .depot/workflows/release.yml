name: release

on:
  push:
    tags: ["20*.*.*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify immutable tag checkout
        run: scripts/verify-release-ref.sh
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/typescript/package-lock.json
      - name: Test and vet
        run: |
          go test ./...
          go vet ./...
          scripts/test-release-contract.sh
      - name: Build deterministic release bundle
        env:
          RELEASE_MODE: build
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""
        run: scripts/publish-homebrew.sh
      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  # GitHub permissions are job-scoped. This is the smallest isolated protected
  # job that can independently re-verify and publish the built bytes.
  publish-github:
    needs: build-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    env:
      GITHUB_REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Check out release metadata
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify immutable clean tag checkout
        run: scripts/verify-release-ref.sh
      - name: Download verified build bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-${{ github.ref_name }}
          path: dist
      - name: Verify exact GitHub publication state
        env:
          RELEASE_MODE: verify
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""
        run: |
          git diff --exit-code --ignore-submodules --
          git diff --cached --exit-code --ignore-submodules --
          git ls-files --others --exclude-standard | LC_ALL=C sort > /tmp/untracked-files
          test ! -s /tmp/untracked-files
          scripts/publish-homebrew.sh
      - name: Publish GitHub release
        env:
          RELEASE_MODE: publish-github
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""
        run: scripts/publish-homebrew.sh

  # Tap publication has no contents:write permission and cannot publish a
  # GitHub release. Its only repository write credential is the fine-grained
  # tap token, exposed after independent bundle verification in the final step.
  publish-homebrew:
    needs: publish-github
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
    env:
      GITHUB_REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Check out release metadata
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify immutable clean tag checkout
        run: scripts/verify-release-ref.sh
      - name: Download GitHub-published verified bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-${{ github.ref_name }}
          path: dist
      - name: Verify exact Homebrew publication state
        env:
          RELEASE_MODE: verify
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""
        run: |
          git diff --exit-code --ignore-submodules --
          git diff --cached --exit-code --ignore-submodules --
          git ls-files --others --exclude-standard | LC_ALL=C sort > /tmp/untracked-files
          test ! -s /tmp/untracked-files
          scripts/publish-homebrew.sh
      - name: Publish Homebrew formula
        env:
          RELEASE_MODE: publish-homebrew
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: scripts/publish-homebrew.sh
