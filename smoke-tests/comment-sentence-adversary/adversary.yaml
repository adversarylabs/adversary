name: smoke-tests/comment-sentence
version: 0.1.0
description: Finds short or incomplete source comments.

triggers:
  files_changed:
    - "*.ts"
    - "**/*.ts"
    - "*.tsx"
    - "**/*.tsx"
    - "*.js"
    - "**/*.js"
    - "*.jsx"
    - "**/*.jsx"
    - "*.go"
    - "**/*.go"
    - "*.py"
    - "**/*.py"

runtime:
  name: node
  version: "22"
  command:
    - dist/run.js

permissions:
  enforcement: advisory
  filesystem:
    read:
      - "."
  network: false
  environment:
    allow: []

findings:
  format: adversary.review.v1
