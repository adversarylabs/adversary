version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule: { interval: weekly }
    groups:
      go-dependencies: { patterns: ["*"] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      actions: { patterns: ["*"] }
  - package-ecosystem: gomod
    directory: /scripts/spdx-validator
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: /templates/typescript
    schedule: { interval: weekly }
    groups:
      typescript-template: { patterns: ["*"] }
